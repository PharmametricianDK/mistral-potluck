name = "mistral-potluck"
main = "worker.js"
compatibility_date = "2024-01-01"

# R2 Bucket configuration - THIS IS REQUIRED
# Create an R2 bucket named "potluck-data" in your Cloudflare account first
[[r2_buckets]]
binding = "POTLUCK_DATA"
bucket_name = "potluck-data"

# For production deployment, uncomment and set your account ID:
# account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
